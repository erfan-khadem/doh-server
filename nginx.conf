###############################################################################
# Nginx reverse proxy for the Go DoH server
# Place this in /etc/nginx/sites-available/doh and symlink to sites-enabled/
###############################################################################

server {
    listen 80;
    server_name doh.yourdomain.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name doh.yourdomain.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # Use certbot / Let's Encrypt:
    #   certbot certonly --nginx -d doh.yourdomain.com
    ssl_certificate     /etc/letsencrypt/live/doh.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/doh.yourdomain.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;

    # ── DoH proxy ────────────────────────────────────────────────────────────
    location /dns-query {
        proxy_pass         http://127.0.0.1:8053;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # DoH uses application/dns-message; don't touch the body
        proxy_pass_request_body  on;
        proxy_pass_request_headers on;

        # Short timeouts are fine for DNS
        proxy_connect_timeout 5s;
        proxy_send_timeout    5s;
        proxy_read_timeout    5s;

        # Clients may send large EDNS payloads
        client_max_body_size 4k;
    }

    # Block everything else
    location / {
        return 404;
    }
}
